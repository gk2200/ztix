<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ztix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>ztix</h1>
    <div class="header-controls">

      <div class="select-wrapper header-select-wrapper">
        <select id="language" class="header-select">
          <option value="en" selected>🇺🇸 EN</option>
          <option value="de">🇩🇪 DE</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="it">🇮🇹 IT</option>
          <option value="pt">🇵🇹 PT</option>
          <option value="nl">🇳🇱 NL</option>
          <option value="pl">🇵🇱 PL</option>
        </select>
      </div>

      <div class="select-wrapper header-select-wrapper">
        <select id="currency" class="header-select">
          <option value="USD" selected>USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CHF">CHF</option>
          <option value="SEK">SEK</option>
          <option value="NOK">NOK</option>
          <option value="DKK">DKK</option>
        </select>
      </div>

      <div class="cart-toggle" id="cart-toggle">
        <button class="cart-btn" id="cart-btn" onclick="toggleCart()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="cart-count" id="cart-count" style="display:none">0</span>
        </button>
        <div class="cart-dropdown" id="cart-dropdown" style="display:none">
          <p class="cart-dropdown-title">Your order</p>
          <div id="cart-items"></div>
        </div>
      </div>

      <div class="settings-toggle">
        <input type="checkbox" id="settings-cb">
        <label class="settings-icon" for="settings-cb">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </label>
        <div class="settings-panel">
          <div class="settings-section">
            <h3>Authentication</h3>
            <div class="form-group">
              <label for="pg-client-id">x-pg-client-id</label>
              <input type="text" id="pg-client-id" value="ven_test_e80ba7ef34b24f658da7b4a1022cfd8a">
            </div>
            <div class="form-group">
              <label for="pg-client-secret">x-pg-client-secret</label>
              <input type="password" id="pg-client-secret" value="rBbYbuaP3Ho6sjaoKrNImVDjhg1rMmrP977S1+Z4quLVrIvj">
            </div>
          </div>
          <div class="settings-section" style="margin-bottom: 0">
            <h3>Member</h3>
            <div class="form-group" style="margin-bottom: 0">
              <label for="member-id">memberId</label>
              <input type="text" id="member-id">
            </div>
          </div>
          <label class="btn-save" for="settings-cb">Save</label>
        </div>
      </div>

    </div>
  </header>

  <main>
    <div class="events-grid" id="events-grid"></div>
  </main>

  <footer>
    <span id="error-msg" class="error-msg"></span>
    <div class="footer-right">
      <div class="tooltip-wrap">
        <svg class="tooltip-icon" id="payload-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <pre class="tooltip-box" id="payload-preview"></pre>
      </div>
      <button class="btn-next" id="next-btn" type="button" onclick="submitQuote()" disabled>Next</button>
    </div>
  </footer>

  <script>
    const EVENTS = [
      {
        category: 'Music',
        imageUrl: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #a855f7 0%, #ec4899 100%)',
        name: 'Taylor Swift — The Eras Tour',
        venue: 'Wembley Stadium, London',
        date: '2026-06-15T19:00:00.000000+00:00',
        displayDate: '15 Jun 2026',
        tiers: [
          { name: 'GA Floor',  price: 150 },
          { name: 'Standing',  price: 110 },
          { name: 'Seated',    price: 85  },
        ],
      },
      {
        category: 'Sport',
        imageUrl: 'https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)',
        name: 'Champions League Final',
        venue: 'Allianz Arena, Munich',
        date: '2026-05-30T20:45:00.000000+01:00',
        displayDate: '30 May 2026',
        tiers: [
          { name: 'Category 1', price: 500 },
          { name: 'Category 2', price: 300 },
          { name: 'Category 3', price: 150 },
        ],
      },
      {
        category: 'Music',
        imageUrl: 'https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #6366f1 0%, #3b82f6 100%)',
        name: 'Coldplay — Music of the Spheres',
        venue: 'Estadio Azteca, Mexico City',
        date: '2026-09-12T20:00:00.000000-06:00',
        displayDate: '12 Sep 2026',
        tiers: [
          { name: 'Pit',               price: 120 },
          { name: 'General Admission', price: 80  },
        ],
      },
      {
        category: 'Sport',
        imageUrl: 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #16a34a 0%, #15803d 100%)',
        name: "Wimbledon — Men's Final",
        venue: 'All England Club, London',
        date: '2026-07-13T14:00:00.000000+01:00',
        displayDate: '13 Jul 2026',
        tiers: [
          { name: 'Centre Court', price: 250 },
          { name: 'Court 1',      price: 120 },
        ],
      },
      {
        category: 'Theatre',
        imageUrl: 'https://images.unsplash.com/photo-1503095396549-807759245b35?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #f59e0b 0%, #b45309 100%)',
        name: 'Hamilton — West End',
        venue: 'Victoria Palace Theatre, London',
        date: '2026-08-22T19:30:00.000000+01:00',
        displayDate: '22 Aug 2026',
        tiers: [
          { name: 'Stalls',        price: 180 },
          { name: 'Royal Circle',  price: 140 },
          { name: 'Grand Circle',  price: 90  },
        ],
      },
      {
        category: 'Sport',
        imageUrl: 'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=600&h=400&fit=crop&auto=format&q=80',
        gradient: 'linear-gradient(135deg, #dc2626 0%, #1e293b 100%)',
        name: 'F1 — Monaco Grand Prix',
        venue: 'Circuit de Monaco',
        date: '2026-05-24T14:00:00.000000+02:00',
        displayDate: '24 May 2026',
        tiers: [
          { name: 'Grandstand K', price: 400 },
          { name: 'Tribune A',    price: 280 },
        ],
      },
    ];

    let items = [];
    let editingIndex = null;
    let modalEventIndex = null;
    let modalQties      = [];

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderEvents() {
      document.getElementById('events-grid').innerHTML = EVENTS.map((event, ei) => `
        <div class="event-card" onclick="openModal(${ei})">
          <div class="event-image" style="background: ${event.gradient}">
            <img src="${event.imageUrl}" alt="${escHtml(event.name)}" onerror="this.style.display='none'">
            <span class="event-badge">${escHtml(event.category)}</span>
          </div>
          <div class="event-card-top">
            <div class="event-name">${escHtml(event.name)}</div>
            <div class="event-meta">${escHtml(event.venue)}</div>
            <div class="event-meta">${escHtml(event.displayDate)}</div>
            <div class="event-price">from ${Math.min(...event.tiers.map(t => t.price))}</div>
          </div>
        </div>
      `).join('');
    }

    function openModal(ei) {
      const event = EVENTS[ei];
      modalEventIndex = ei;
      modalQties      = new Array(event.tiers.length).fill(0);

      const wrap = document.getElementById('modal-img-wrap');
      wrap.style.background = event.gradient;
      const img = document.getElementById('modal-img');
      img.src = event.imageUrl;
      img.style.display = '';

      document.getElementById('modal-badge').textContent = event.category;
      document.getElementById('modal-title').textContent = event.name;
      document.getElementById('modal-venue').textContent = event.venue;
      document.getElementById('modal-date').textContent  = event.displayDate;

      renderModalTiers();
      updateModalTotal();
      document.getElementById('modal-overlay').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      document.body.style.overflow = '';
      modalEventIndex = null;
    }

    function renderModalTiers() {
      const event = EVENTS[modalEventIndex];
      document.getElementById('modal-tiers').innerHTML = event.tiers.map((t, ti) => `
        <div class="tier-option">
          <div class="tier-option-info">
            <span class="tier-option-name">${escHtml(t.name)}</span>
            <span class="tier-option-price">${t.price}</span>
          </div>
          <div class="tier-qty-stepper">
            <button class="tier-qty-btn" onclick="changeTierQty(${ti}, -1)" ${modalQties[ti] === 0 ? 'disabled' : ''}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="tier-qty-val">${modalQties[ti]}</span>
            <button class="tier-qty-btn" onclick="changeTierQty(${ti}, 1)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function changeTierQty(ti, delta) {
      modalQties[ti] = Math.max(0, modalQties[ti] + delta);
      renderModalTiers();
      updateModalTotal();
      document.getElementById('modal-add-btn').disabled = modalQties.every(q => q === 0);
    }

    function updateModalTotal() {
      const event = EVENTS[modalEventIndex];
      const total = event.tiers.reduce((sum, t, ti) => sum + t.price * modalQties[ti], 0);
      document.getElementById('modal-total').textContent = total;
      document.getElementById('modal-add-btn').disabled = total === 0;
    }

    function addToCartFromModal() {
      const event = EVENTS[modalEventIndex];
      document.getElementById('error-msg').textContent = '';
      event.tiers.forEach((tier, ti) => {
        if (modalQties[ti] > 0) {
          items.push({
            name:            `${event.name} — ${tier.name}`,
            eventDate:       event.date,
            numberOfTickets: modalQties[ti],
            pricePerTicket:  tier.price,
            value:           tier.price * modalQties[ti],
          });
        }
      });
      renderCart();
      closeModal();
    }

    function editItem(index) {
      editingIndex = index;
      renderCart();
    }

    function saveEdit(index) {
      const name            = document.getElementById(`edit-name-${index}`).value.trim();
      const numberOfTickets = Number(document.getElementById(`edit-qty-${index}`).value);
      const value           = Number(document.getElementById(`edit-val-${index}`).value);
      if (!name || !numberOfTickets || !value) return;
      items[index] = { ...items[index], name, numberOfTickets, value };
      editingIndex = null;
      renderCart();
    }

    function cancelEdit() {
      editingIndex = null;
      renderCart();
    }

    function removeItem(index) {
      items.splice(index, 1);
      if (editingIndex === index) editingIndex = null;
      else if (editingIndex !== null && editingIndex > index) editingIndex--;
      renderCart();
    }

    function toggleCart() {
      const dd = document.getElementById('cart-dropdown');
      dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
    }

    document.addEventListener('click', function (e) {
      const toggle = document.getElementById('cart-toggle');
      if (toggle && !toggle.contains(e.target)) {
        document.getElementById('cart-dropdown').style.display = 'none';
      }
    });

    function renderCart() {
      const container = document.getElementById('cart-items');
      const countEl   = document.getElementById('cart-count');
      const cartBtn   = document.getElementById('cart-btn');
      document.getElementById('next-btn').disabled = items.length === 0;

      if (items.length === 0) {
        countEl.style.display = 'none';
        cartBtn.classList.remove('cart-btn--has-items');
        container.innerHTML = '';
        return;
      }

      countEl.style.display = '';
      countEl.textContent = items.length;
      cartBtn.classList.add('cart-btn--has-items');

      container.innerHTML = items.map((item, i) => {
        if (editingIndex === i) {
          return `
            <div class="cart-item cart-item--editing">
              <input class="cart-edit-input" id="edit-name-${i}" type="text" value="${escHtml(item.name)}">
              <div class="cart-edit-row">
                <input class="cart-edit-input" id="edit-qty-${i}" type="number" min="1" step="1" value="${item.numberOfTickets}" placeholder="Qty">
                <input class="cart-edit-input" id="edit-val-${i}" type="number" min="0" step="0.01" value="${item.value}" placeholder="Value">
              </div>
              <div class="cart-item-actions">
                <button onclick="saveEdit(${i})">Save</button>
                <button onclick="cancelEdit()">Cancel</button>
              </div>
            </div>
          `;
        }
        return `
          <div class="cart-item">
            <div class="cart-item-name">${escHtml(item.name)}</div>
            <div class="cart-item-meta">${item.numberOfTickets} ticket${item.numberOfTickets !== 1 ? 's' : ''} &middot; ${item.value}</div>
            <div class="cart-item-actions">
              <button onclick="editItem(${i})">Edit</button>
              <button onclick="removeItem(${i})">Remove</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function buildQuoteBody() {
      const earliestDate = items.reduce(
        (min, item) => item.eventDate < min ? item.eventDate : min,
        items[0].eventDate
      );
      return {
        currencyCode:        document.getElementById('currency').value,
        eventTravelDateTime: earliestDate,
        languageCode:        document.getElementById('language').value,
        member:              document.getElementById('member-id').value,
        returnHtml:          true,
        values: items.map(item => ({
          numberOfTickets: item.numberOfTickets,
          value:           item.value,
        })),
      };
    }

    async function submitQuote() {
      const btn      = document.getElementById('next-btn');
      const errorMsg = document.getElementById('error-msg');
      if (items.length === 0) return;

      const body = buildQuoteBody();
      btn.disabled    = true;
      btn.textContent = 'Loading...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/quote', {
          method: 'POST',
          headers: {
            'Content-Type':       'application/json',
            'x-pg-client-id':     document.getElementById('pg-client-id').value,
            'x-pg-client-secret': document.getElementById('pg-client-secret').value,
          },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(`${res.status}: ${JSON.stringify(errBody)}`);
        }

        const data = await res.json();
        sessionStorage.setItem('quoteResponse', JSON.stringify(data));
        sessionStorage.setItem('cartItems', JSON.stringify(items));
        sessionStorage.setItem('quoteRequest', JSON.stringify({
          numberOfTickets: items.reduce((sum, item) => sum + item.numberOfTickets, 0),
          ticketValue:     items.reduce((sum, item) => sum + item.value, 0),
          member:          body.member,
        }));
        sessionStorage.setItem('pgClientId',     document.getElementById('pg-client-id').value);
        sessionStorage.setItem('pgClientSecret', document.getElementById('pg-client-secret').value);

        window.location.href = 'payment.html';
      } catch (err) {
        errorMsg.textContent = `Error: ${err.message}`;
        btn.disabled    = false;
        btn.textContent = 'Next';
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('payload-icon').addEventListener('mouseenter', function () {
      if (items.length === 0) {
        document.getElementById('payload-preview').textContent = '(no items in cart)';
        return;
      }
      document.getElementById('payload-preview').textContent = JSON.stringify(buildQuoteBody(), null, 2);
    });

    renderEvents();
  </script>

  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-image" id="modal-img-wrap">
        <img id="modal-img" src="" alt="" onerror="this.style.display='none'">
        <span class="modal-image-badge" id="modal-badge"></span>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta" id="modal-venue"></div>
        <div class="modal-meta" id="modal-date"></div>

        <div class="modal-section">
          <p class="modal-section-label">Ticket type</p>
          <div class="tier-options" id="modal-tiers"></div>
        </div>

        <div class="modal-footer">
          <div>
            <div class="modal-total-label">Total</div>
            <div class="modal-total" id="modal-total"></div>
          </div>
          <button class="btn-add-event" id="modal-add-btn" onclick="addToCartFromModal()" disabled>Add to cart</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
